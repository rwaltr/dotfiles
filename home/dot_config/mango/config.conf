# Mango config for DMS + niri-style transition
# Docs:
# - https://mangowm.github.io/docs
# - https://danklinux.com/docs/dankmaterialshell/compositors

# Environment
env=QT_QPA_PLATFORM,wayland
env=ELECTRON_OZONE_PLATFORM_HINT,auto
env=QT_QPA_PLATFORMTHEME,gtk3

# Startup
# Mango isn't packaged here as a systemd-managed user compositor session,
# so start DMS directly for reliable shell startup inside Mango.
exec-once=dms run
exec-once=wl-paste --type text --watch cliphist store

# Window effects / appearance
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

shadows=1
layer_shadows=0
shadow_only_floating=1
shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x00000070

border_radius=12
focused_opacity=1.0
unfocused_opacity=0.9
borderpx=0

# Layout
scroller_structs=20
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

gappih=5
gappiv=5
gappoh=5
gappov=5
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

# Misc behavior
focus_on_activate=1
sloppyfocus=0
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# Keyboard / pointer
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
mouse_natural_scrolling=0

# Colors
rootcolor=0x201b14ff
bordercolor=0x444444ff
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# Use scroller everywhere for a more niri-like default feel
# layout support:
# tile, scroller, grid, deck, monocle, center_tile, vertical_tile,
# vertical_scroller, right_tile, vertical_grid, vertical_deck, tgmix
tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:scroller
tagrule=id:6,layout_name:scroller
tagrule=id:7,layout_name:scroller
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller

# DMS integration
layerrule=noanim:1,layer_name:^dms
windowrule=isnoborder:1,appid:^org\.gnome\.
windowrule=isnoborder:1,appid:^org\.wezfurlong\.wezterm$
windowrule=isnoborder:1,appid:^Alacritty$
windowrule=isnoborder:1,appid:^com\.mitchellh\.ghostty$
windowrule=isnoborder:1,appid:^kitty$
windowrule=isfloating:1,appid:^org\.quickshell$

# Key bindings
# key names refer to `xev` / `wev`
# mod keys: super, ctrl, alt, shift, none

# launchers / shell
bind=SUPER,space,spawn,dms ipc call spotlight toggle
bind=SUPER,v,spawn,dms ipc call clipboard toggle
bind=SUPER,m,spawn,dms ipc call processlist focusOrToggle
bind=SUPER,comma,spawn,dms ipc call settings focusOrToggle
bind=SUPER,n,spawn,dms ipc call notifications toggle
bind=SUPER+SHIFT,n,spawn,dms ipc call notepad toggle
bind=SUPER,y,spawn,dms ipc call dankdash wallpaper
bind=SUPER+ALT,l,spawn,dms ipc call lock lock
bind=SUPER,Return,spawn,flatpak run org.wezfurlong.wezterm
bind=SUPER,t,spawn,flatpak run org.wezfurlong.wezterm
bind=ALT,Return,spawn,flatpak run org.wezfurlong.wezterm

# audio / brightness
bind=NONE,XF86AudioRaiseVolume,spawn,dms ipc call audio increment 3
bind=NONE,XF86AudioLowerVolume,spawn,dms ipc call audio decrement 3
bind=NONE,XF86AudioMute,spawn,dms ipc call audio mute
bind=NONE,XF86AudioMicMute,spawn,dms ipc call audio micmute
bind=NONE,XF86MonBrightnessUp,spawn,dms ipc call brightness increment 5
bind=NONE,XF86MonBrightnessDown,spawn,dms ipc call brightness decrement 5

# session / lifecycle
bind=SUPER+SHIFT,e,quit
bind=SUPER,q,killclient,
bind=SUPER+SHIFT,r,reload_config

# overview / window state
bind=SUPER,d,toggleoverview,
bind=SUPER,Tab,focusstack,next
bind=SUPER+SHIFT,Tab,focusstack,prev
bind=ALT,Tab,toggleoverview,
bind=SUPER+SHIFT,t,togglefloating,
bind=SUPER,f,togglemaximizescreen,
bind=SUPER+SHIFT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,g,toggleglobal,
bind=SUPER,o,toggleoverlay,
bind=ALT,z,toggle_scratchpad

# focus navigation
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# move / swap windows
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down

# tags (workspace-like)
bind=SUPER,u,viewtoleft,0
bind=SUPER,i,viewtoright,0
bind=SUPER+CTRL,u,tagtoleft,0
bind=SUPER+CTRL,i,tagtoright,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=CTRL,Right,viewtoright_have_client,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# multiview: toggle a tag into the current view
bind=SUPER+CTRL,1,spawn,mmsg -s -t 1^
bind=SUPER+CTRL,2,spawn,mmsg -s -t 2^
bind=SUPER+CTRL,3,spawn,mmsg -s -t 3^
bind=SUPER+CTRL,4,spawn,mmsg -s -t 4^
bind=SUPER+CTRL,5,spawn,mmsg -s -t 5^
bind=SUPER+CTRL,6,spawn,mmsg -s -t 6^
bind=SUPER+CTRL,7,spawn,mmsg -s -t 7^
bind=SUPER+CTRL,8,spawn,mmsg -s -t 8^
bind=SUPER+CTRL,9,spawn,mmsg -s -t 9^

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# monitor navigation
bind=SUPER+CTRL,Left,focusmon,left
bind=SUPER+CTRL,Right,focusmon,right
bind=SUPER+CTRL+SHIFT,Left,tagmon,left
bind=SUPER+CTRL+SHIFT,Right,tagmon,right

# layout controls
bind=SUPER,w,switch_layout
bind=SUPER,e,zoom
bind=SUPER,c,centerwin
bind=SUPER,r,switch_proportion_preset,
bind=SUPER+CTRL,r,set_proportion,1.0
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# gaps
bind=ALT+SHIFT,x,incgaps,1
bind=ALT+SHIFT,z,incgaps,-1
bind=ALT+SHIFT,r,togglegaps

# floating move / resize
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# mouse bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# mouse wheel tag navigation
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# DMS-generated includes
source=~/.config/mango/dms/colors.conf
source-optional=~/.config/mango/dms/layout.conf
source-optional=~/.config/mango/dms/outputs.conf

source=./dms/cursor.conf
